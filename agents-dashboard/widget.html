<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>agents</title>
<style>
  :root {
    --bg: rgba(10, 10, 10, 0.88);
    --fg: #e7e7e7;
    --dim: #8a8a8a;
    --accent: #4ade80;
    --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; }
  body.demo { background: linear-gradient(135deg, #1b2735, #090a0f); }

  #card {
    width: 360px;
    font-family: var(--mono);
    background: var(--bg);
    border-left: 2px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px 12px;
    color: var(--fg);
  }
  #title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 5px 0;
    font-size: 14px;
    border-top: 1px solid rgba(255, 255, 255, 0.07);
  }
  .row:first-of-type { border-top: none; }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #3a3a3a;
    flex: none;
  }
  .dot.on {
    background: var(--accent);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    50% { opacity: 0.25; box-shadow: 0 0 0 3px rgba(74, 222, 128, 0.15); }
  }
  .project {
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
  }
  .model { color: var(--accent); font-size: 12px; flex: 1; text-align: right; }
  .uptime { color: var(--dim); font-size: 12px; width: 52px; text-align: right; flex: none; }
  #empty { color: var(--dim); font-size: 13px; padding: 4px 0; }
</style>
</head>
<body>
<div id="card">
  <div id="title">⏺ agents</div>
  <div id="list"><div id="empty">нет активных сессий</div></div>
</div>
<script>
  const list = document.getElementById('list');

  function render(sessions) {
    if (!sessions.length) {
      list.innerHTML = '<div id="empty">нет активных сессий</div>';
      return;
    }
    list.innerHTML = sessions.map(s => `
      <div class="row">
        <div class="dot ${s.thinking ? 'on' : ''}"></div>
        <div class="project">${s.project}</div>
        <div class="model">${s.model || ''}</div>
        <div class="uptime">${s.uptime}</div>
      </div>`).join('');
  }

  function connect() {
    const es = new EventSource('/events');
    es.onmessage = (e) => render(JSON.parse(e.data));
    es.onerror = () => { es.close(); setTimeout(connect, 3000); };
  }

  if (new URLSearchParams(location.search).has('demo')) {
    document.body.classList.add('demo');
    render([
      { project: '0_hq', model: 'fable-5', uptime: '1h 15m', thinking: true },
      { project: 'obs-overlay', model: 'opus-4-8', uptime: '12m', thinking: false },
    ]);
  } else {
    connect();
  }
</script>
</body>
</html>
